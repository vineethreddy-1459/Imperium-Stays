<section>

<h1 style="text-align:center;color:#0B2447;margin-bottom:20px;">
Book Your Stay
</h1>

<div style="max-width:700px;margin:auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,.1);">

<form>

<label>Full Name</label><br><br>
<input type="text" placeholder="Enter your name" style="width:100%;padding:12px;"><br><br>

<label>Email</label><br><br>
<input type="email" placeholder="Enter your email" style="width:100%;padding:12px;"><br><br>

<label>Check-in Date</label><br><br>
<input type="date" style="width:100%;padding:12px;"><br><br>

<label>Check-out Date</label><br><br>
<input type="date" style="width:100%;padding:12px;"><br><br>

<label>Guests</label><br><br>
<input type="number" placeholder="Number of guests" style="width:100%;padding:12px;"><br><br>

<label>Room Type</label><br><br>
<select style="width:100%;padding:12px;">
<option>Deluxe Room</option>
<option>Executive Room</option>
<option>Family Suite</option>
<option>Presidential Suite</option>
</select>

<br><br>

<button class="btn" type="submit">Confirm Booking</button>

</form>

</div>
